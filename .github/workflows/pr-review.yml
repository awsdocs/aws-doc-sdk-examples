name: AI PR Review
on:
  pull_request_target:
    types: [opened, synchronize]
    paths:
      - 'python/example_code/**'
      - 'python/cross_service/**'
      - 'javav2/example_code/**'
      - 'javav2/usecases/**'
      - 'javascriptv3/example_code/**'
      - 'dotnetv3/**'
      - 'dotnetv4/**'
      - 'rustv1/examples/**'
      - 'rustv1/cross_service/**'
      - 'gov2/**'
      - 'swift/example_code/**'
      - 'ruby/example_code/**'
      - 'ruby/cross_service_examples/**'
      - 'php/example_code/**'
      - 'php/cross_service/**'
      - 'cpp/example_code/**'
      - 'kotlin/services/**'
      - 'kotlin/usecases/**'
      - 'scenarios/**'
      - 'aws-cli/**'
  workflow_dispatch:
    inputs:
      pr_number:
        description: 'PR number to review (for manual testing)'
        required: true
        type: string

permissions:
  id-token: write
  pull-requests: write
  contents: read

jobs:
  ai-review:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v5
        with:
          role-to-assume: ${{ secrets.AWS_PR_REVIEW_ROLE }}
          aws-region: us-west-2
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install boto3

      - name: Get PR diff
        id: diff
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number || github.event.inputs.pr_number }}
        run: |
          gh api repos/${{ github.repository }}/pulls/${PR_NUMBER}/files \
            --paginate --jq '.[].patch // empty' > /tmp/pr_diff.txt
          gh api repos/${{ github.repository }}/pulls/${PR_NUMBER}/files \
            --paginate --jq '.[].filename' > /tmp/pr_files.txt

      - name: Run AI Review
        id: review
        env:
          PR_NUMBER: ${{ github.event.pull_request.number || github.event.inputs.pr_number }}
          PR_TITLE: ${{ github.event.pull_request.title || 'Manual review' }}
          PR_BODY: ${{ github.event.pull_request.body || '' }}
        run: python .tools/scripts/pr_review.py

      - name: Post review comment
        if: steps.review.outputs.has_review == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number || github.event.inputs.pr_number }}
        run: |
          gh pr comment ${PR_NUMBER} \
            --repo ${{ github.repository }} \
            --body-file /tmp/review_comment.md
