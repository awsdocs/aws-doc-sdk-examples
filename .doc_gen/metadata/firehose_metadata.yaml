firehose_Scenario:
  title: Get started with &FHlong; delivery streams
  title_abbrev: Get started with delivery streams
  synopsis: learn the basics of &FHlong; by creating and managing delivery streams.
  category: Scenarios
  synopsis_list:
    - Create a Firehose delivery stream with an S3 destination.
    - Describe and list delivery streams.
    - Tag, list tags, and untag a delivery stream.
    - Enable and disable server-side encryption.
    - Put single and batch records.
    - Delete the delivery stream and clean up resources.
  languages:
    Python:
      versions:
        - sdk_version: 3
          github: python/example_code/firehose
          excerpts:
            - description: Create the Firehose wrapper class.
              snippet_tags:
                - python.example_code.firehose.FirehoseWrapper.decl
            - description: Run an interactive scenario demonstrating Firehose basics.
              snippet_tags:
                - python.example_code.firehose.FirehoseScenario
  services:
    firehose:
      CreateDeliveryStream:
      DescribeDeliveryStream:
      ListDeliveryStreams:
      TagDeliveryStream:
      ListTagsForDeliveryStream:
      StartDeliveryStreamEncryption:
      StopDeliveryStreamEncryption:
      DeleteDeliveryStream:
